words.forEach(element => {
    element["strength"] = 1;
});

let score = 0;
let total = 0;

// Weighted random selection based on strength
function pickWord() {
    let weightedList = [];

    words.forEach(w => {
        let weight = Math.max(1, 5 - w.strength); 
        for (let i = 0; i < weight; i++) {
            weightedList.push(w);
        }
    });

    return weightedList[Math.floor(Math.random() * weightedList.length)];
}

function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

function loadQuestion() {
    document.getElementById("options").innerHTML = "";

    let word = pickWord();
    document.getElementById("word").textContent = word.dutch;

    let choices = shuffle([
        word.english,
        ...shuffle(words.filter(w => w !== word)).slice(0, 3).map(w => w.english)
    ]);

    choices.forEach(choice => {
        let btn = document.createElement("button");
        btn.textContent = choice;

        btn.onclick = () => {
            total++;

            if (choice === word.english) {
                score++;
                word.strength = Math.min(5, word.strength + 1);
                btn.classList.add("correct");
            } else {
                word.strength = Math.max(1, word.strength - 1);
                btn.classList.add("wrong");
            }

            console.log("Weak words:", words.filter(w => w.strength < 3));

            setTimeout(loadQuestion, 700);
            updateScore();
        };

        document.getElementById("options").appendChild(btn);
    });
}

function updateScore() {
    document.getElementById("score").textContent =
        `Score: ${score} / ${total}`;
}

loadQuestion();
