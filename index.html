<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dutch Vocabulary Trainer</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    h1 {
        margin-bottom: 20px;
    }

    .card {
        background: white;
        width: 90%;
        max-width: 400px;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        text-align: center;
        margin-bottom: 20px;
    }

    .word {
        font-size: 28px;
        font-weight: bold;
        margin-bottom: 10px;
    }

    .meaning {
        font-size: 20px;
        color: #444;
        display: none;
        margin-bottom: 20px;
    }

    button {
        padding: 12px 20px;
        margin: 5px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
    }

    .show-btn { background: #007bff; color: white; }
    .next-btn { background: #28a745; color: white; }
</style>
</head>
<body>

<h1>Dutch Vocabulary Trainer</h1>

<div class="card">
    <div class="word" id="word"></div>
    <div class="meaning" id="meaning"></div>

    <button class="show-btn" onclick="showMeaning()">Show Meaning</button>
    <button class="next-btn" onclick="nextWord()">Next Word</button>
</div>

<script>
const words = [
    { dutch: "voorwoord", english: "Preface" },
    { dutch: "herziene druk", english: "revised edition" },
    { dutch: "destijds", english: "at that time" },
    { dutch: "verschillende", english: "different" },
    { dutch: "getrouwd", english: "married" },
    { dutch: "de bruiloft", english: "wedding" },
    { dutch: "het huwelijk", english: "marriage" },
    { dutch: "bespreek", english: "discuss" },
    { dutch: "de familie", english: "family" },
    { dutch: "het dorp", english: "village" }
];

let index = 0;

function loadWord() {
    document.getElementById("word").textContent = words[index].dutch;
    document.getElementById("meaning").textContent = words[index].english;
    document.getElementById("meaning").style.display = "none";
}

function showMeaning() {
    document.getElementById("meaning").style.display = "block";
}

function nextWord() {
    index = (index + 1) % words.length;
    loadWord();
}

loadWord();
</script>

</body>
</html>
